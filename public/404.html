<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Capital Edge</title>
  <script>
    // SPA fallback: store the full path in sessionStorage and redirect to root
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
