        <style>
            :root {
                font-size: 62.5%;

            #ce-splash {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #050d0a;
                z-index: 99999;
                overflow: hidden;
                transition: opacity 0.4s ease;
            }

            #ce-splash.hidden {
                opacity: 0;
                pointer-events: none;
            }

            #ce-splash .ce-bg {
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(ellipse 80% 60% at 60% 70%, rgba(120, 0, 0, 0.35) 0%, transparent 70%),
                    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0, 80, 0, 0.25) 0%, transparent 70%);
            }

            #ce-splash .ce-chart {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                opacity: 0.22;
            }

            #ce-splash .ce-logo-wrap {
                position: relative;
                z-index: 2;
                text-align: center;
            }

            #ce-splash .ce-logo-text {
                font-family: Georgia, 'Times New Roman', serif;
                font-size: clamp(32px, 8vw, 52px);
                font-weight: 700;
                background: linear-gradient(90deg, #22c55e 0%, #ff4444 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: 0.02em;
                line-height: 1;
            }

            @keyframes ce-pulse {
                0%, 100% { opacity: 0.7; }
                50% { opacity: 1; }
            }
        </style>

        <!-- Browser Service Worker Prevention -->
        <script>
            // Check browser compatibility and prevent service worker issues
            const userAgent = navigator.userAgent.toLowerCase();
            const isFirefox = userAgent.includes('firefox');
            const isSafari = userAgent.includes('safari') && !userAgent.includes('chrome');
            const shouldSkipSW = isFirefox || isSafari;

            if (shouldSkipSW) {
                const browserName = isFirefox ? 'Firefox' : 'Safari';
                console.log(
                    `[HTML] ${browserName} detected - preventing service worker registration to avoid chunk loading issues`
                );

                // Cleanup any existing service workers
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker
                        .getRegistrations()
                        .then(registrations => {
                            registrations.forEach(registration => {
                                console.log(`[HTML] Unregistering existing SW for ${browserName}:`, registration.scope);
                                registration.unregister();
                            });
                        })
                        .catch(error => {
                            console.error('[HTML] Failed to cleanup service workers:', error);
                        });
                }
            }

            // Check online/offline status
            console.log('[HTML] Online status:', navigator.onLine);
            window.addEventListener('online', () => {
                console.log('[HTML] Back online');
            });
            window.addEventListener('offline', () => {
                console.log('[HTML] Gone offline');
            });

            // Listen for service worker messages if registered by PWA utils (non-problematic browsers only)
            if ('serviceWorker' in navigator && !shouldSkipSW) {
                navigator.serviceWorker.addEventListener('message', event => {
                    console.log('[HTML] Message from service worker:', event.data);
                });
            }
        </script>
